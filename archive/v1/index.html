<script type="module">
import * as THREE from 'three';

// ===== input.ts =====

// 鼠标瞄准 + 按键。射击为点击触发，换弹R。
class Input {
  // 归一化鼠标位置（NDC，-1~1）
  mouseNDC                = new THREE.Vector2(0, 0);
  mousePx                           = { x: 0, y: 0 };
          keys              = new Set();
          pressed              = new Set();
          clicked          = false;
          mouseDown          = false;

  constructor(canvas                   ) {
    window.addEventListener('mousemove', (e            ) => {
      this.mousePx.x = e.clientX;
      this.mousePx.y = e.clientY;
      this.mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
      this.mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });
    canvas.addEventListener('mousedown', (e            ) => {
      if (e.button === 0) {
        this.clicked = true;
        this.mouseDown = true;
      }
    });
    window.addEventListener('mouseup', (e            ) => {
      if (e.button === 0) this.mouseDown = false;
    });
    window.addEventListener('keydown', (e               ) => {
      if (!this.keys.has(e.code)) this.pressed.add(e.code);
      this.keys.add(e.code);
    });
    window.addEventListener('keyup', (e               ) => this.keys.delete(e.code));
    window.addEventListener('blur', () => {
      this.keys.clear();
      this.mouseDown = false;
    });
    window.addEventListener('contextmenu', (e            ) => e.preventDefault());
  }

  // 本帧是否点击（消费式）
  consumeClick()          {
    const c = this.clicked;
    this.clicked = false;
    return c;
  }

  isFiring()          {
    return this.mouseDown;
  }

  wasPressed(code        )          {
    if (this.pressed.has(code)) {
      this.pressed.delete(code);
      return true;
    }
    return false;
  }

  endFrame()       {
    this.pressed.clear();
    this.clicked = false;
  }
}


// ===== audio.ts =====
// 程序化音效 + 微恐环境音（WebAudio）
class AudioFX {
          ctx                      = null;
          master                  = null;
          droneOsc                   = [];
          groanTimer         = 6;
          heartTimer         = 0;

  init()       {
    if (!this.ctx) {
      const AC = (window       ).AudioContext || (window       ).webkitAudioContext;
      this.ctx = new AC();
      this.master = this.ctx .createGain();
      this.master.gain.value = 1;
      this.master.connect(this.ctx .destination);
    }
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  }

          beep(
    freq        , dur        , type                , vol        , slideTo         , delay         = 0
  )       {
    if (!this.ctx || !this.master) return;
    const t = this.ctx.currentTime + delay;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (slideTo !== undefined) osc.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(g).connect(this.master);
    osc.start(t);
    osc.stop(t + dur);
  }

  // 噪声爆发（枪声主体）
          noise(dur        , vol        , lowpass        , delay         = 0)       {
    if (!this.ctx || !this.master) return;
    const t = this.ctx.currentTime + delay;
    const len = Math.floor(this.ctx.sampleRate * dur);
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / len);
    }
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = lowpass;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(filter).connect(g).connect(this.master);
    src.start(t);
  }

  gunshot()       {
    this.noise(0.16, 0.4, 2200);
    this.beep(160, 0.1, 'square', 0.16, 50);
  }
  dryFire()       { this.beep(900, 0.04, 'square', 0.05); }
  reloadStart()       { this.beep(500, 0.06, 'square', 0.07, 300); }
  reloadEnd()       {
    this.beep(700, 0.05, 'square', 0.08);
    this.beep(1100, 0.06, 'square', 0.07, undefined, 0.07);
  }
  hit()       { this.beep(220, 0.05, 'sawtooth', 0.07, 100); }
  headshot()       {
    this.beep(1500, 0.07, 'square', 0.1, 2200);
    this.noise(0.08, 0.18, 4000);
  }
  zombieDie()       { this.beep(120, 0.4, 'sawtooth', 0.12, 40); }
  zombieGroan(vol         = 0.07)       {
    this.beep(75 + Math.random() * 40, 0.7, 'sawtooth', vol, 55);
  }
  meleeHit()       {
    this.noise(0.12, 0.3, 800);
    this.beep(90, 0.2, 'sawtooth', 0.14, 45);
  }
  loot()       { this.beep(880, 0.08, 'sine', 0.08, 1320); }
  coin()       {
    this.beep(1180, 0.05, 'square', 0.05);
    this.beep(1560, 0.08, 'square', 0.05, undefined, 0.05);
  }
  doorOpen()       {
    this.noise(0.4, 0.12, 500);
    this.beep(70, 0.45, 'sine', 0.1, 45);
  }
  searchTick()       { this.beep(600, 0.03, 'square', 0.03); }
  altar()       {
    this.beep(440, 0.3, 'sine', 0.09, 880);
    this.beep(660, 0.4, 'sine', 0.07, 1320, 0.15);
  }
  sanityHit()       { this.beep(2300, 0.25, 'sine', 0.06, 200); }
  extractOk()       {
    this.beep(523, 0.12, 'triangle', 0.1);
    this.beep(659, 0.12, 'triangle', 0.1, undefined, 0.12);
    this.beep(784, 0.12, 'triangle', 0.1, undefined, 0.24);
    this.beep(1046, 0.3, 'triangle', 0.12, undefined, 0.36);
  }
  death()       { this.beep(300, 0.8, 'sawtooth', 0.14, 40); }
  heartbeat()       {
    this.beep(55, 0.1, 'sine', 0.22, 40);
    this.beep(50, 0.12, 'sine', 0.18, 35, 0.18);
  }

  // 暗黑低音垫（持续环境音）
  startAmbient()       {
    if (!this.ctx || !this.master || this.droneOsc.length > 0) return;
    const g = this.ctx.createGain();
    g.gain.value = 0.035;
    g.connect(this.master);
    for (const f of [55, 55.7, 110.3]) {
      const o = this.ctx.createOscillator();
      o.type = 'sawtooth';
      o.frequency.value = f;
      const og = this.ctx.createGain();
      og.gain.value = f > 100 ? 0.3 : 1;
      o.connect(og).connect(g);
      o.start();
      this.droneOsc.push(o);
    }
  }

  // 每帧：随机远处低吼 + 低神智心跳
  updateAmbient(dt        , sanityRatio        )       {
    this.groanTimer -= dt;
    if (this.groanTimer <= 0) {
      this.groanTimer = 5 + Math.random() * 9;
      this.zombieGroan(0.03 + Math.random() * 0.03);
    }
    if (sanityRatio < 0.35) {
      this.heartTimer -= dt;
      if (this.heartTimer <= 0) {
        this.heartTimer = 0.6 + sanityRatio * 1.6;
        this.heartbeat();
      }
    }
  }
}


// ===== meta.ts =====
// 局外持久化：金库、最深记录
                           
                            
                    
               
                   
 

const KEY = 'tomb_meta_v1';

class Meta {
  data          ;

  constructor() {
    this.data = { bank: 0, bestDepth: 0, runs: 0, extracts: 0 };
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) {
        const p = JSON.parse(raw);
        if (typeof p.bank === 'number') this.data = { ...this.data, ...p };
      }
    } catch (e) { /* 降级单次会话 */ }
  }

  save()       {
    try {
      localStorage.setItem(KEY, JSON.stringify(this.data));
    } catch (e) { /* ignore */ }
  }
}

function rollLoot(depth        )             {
  const r = Math.random();
  const mult = 1 + depth * 0.15;
  if (r < 0.34) {
    const c = Math.round((8 + Math.random() * 12) * mult);
    return { name: `金币 ×${c}`, icon: '🪙', coins: c, hp: 0, sanity: 0, ammoBoost: false };
  }
  if (r < 0.52) {
    return { name: '医疗包 +30HP', icon: '🩹', coins: 0, hp: 30, sanity: 0, ammoBoost: false };
  }
  if (r < 0.68) {
    return { name: '镇静剂 +12神智', icon: '💊', coins: 0, hp: 0, sanity: 12, ammoBoost: false };
  }
  if (r < 0.82) {
    return { name: '强化弹药 伤害+10%', icon: '🔫', coins: 0, hp: 0, sanity: 0, ammoBoost: true };
  }
  if (r < 0.95) {
    const c = Math.round((25 + Math.random() * 25) * mult);
    return { name: `古代饰品 价值${c}`, icon: '🏺', coins: c, hp: 0, sanity: 0, ammoBoost: false };
  }
  const c = Math.round((70 + Math.random() * 60) * mult);
  return { name: `稀世珍宝 价值${c}！`, icon: '👑', coins: c, hp: 0, sanity: 0, ammoBoost: false };
}

const WIDTH = 11;
const HEIGHT = 5.2;

// 共享石材纹理
let stoneTex                             = null;
function getStoneTex()                      {
  if (stoneTex) return stoneTex;
  const c = document.createElement('canvas');
  c.width = 128; c.height = 128;
  const g = c.getContext('2d') ;
  g.fillStyle = '#5a4d3b';
  g.fillRect(0, 0, 128, 128);
  // 砖缝
  g.strokeStyle = '#473c2e';
  g.lineWidth = 2;
  for (let y = 0; y < 128; y += 32) {
    g.beginPath(); g.moveTo(0, y); g.lineTo(128, y); g.stroke();
    const off = (y / 32) % 2 === 0 ? 0 : 32;
    for (let x = off; x < 128; x += 64) {
      g.beginPath(); g.moveTo(x, y); g.lineTo(x, y + 32); g.stroke();
    }
  }
  // 噪点风化
  for (let i = 0; i < 500; i++) {
    g.fillStyle = `rgba(30,24,16,${0.05 + Math.random() * 0.1})`;
    g.fillRect(Math.random() * 128, Math.random() * 128, 2, 2);
  }
  stoneTex = new THREE.CanvasTexture(c);
  stoneTex.wrapS = THREE.RepeatWrapping;
  stoneTex.wrapT = THREE.RepeatWrapping;
  return stoneTex;
}

class Dungeon {
  rooms         = [];
          scene             ;
          nextZ         = 0; // 下一个房间入口z
          depthCount         = 0;

  constructor(scene             ) {
    this.scene = scene;
  }

  get currentDepth()         {
    return this.depthCount;
  }

  // 决定下一房间候选（每3间出岔路二选一；第10/20/30…间为撤离点）
  nextOptions()             {
    const d = this.depthCount + 1;
    if (d % 10 === 0) return ['extract'];
    if (d % 3 === 0) {
      // 岔路二选一
      const pool             = ['combat', 'treasure', 'altar', 'corridor'];
      const a = pool[Math.floor(Math.random() * pool.length)];
      let b = pool[Math.floor(Math.random() * pool.length)];
      if (b === a) b = pool[(pool.indexOf(a) + 1) % pool.length];
      return [a, b];
    }
    const r = Math.random();
    if (r < 0.45) return ['combat'];
    if (r < 0.7) return ['treasure'];
    if (r < 0.82) return ['altar'];
    return ['corridor'];
  }

  append(type          )       {
    this.depthCount += 1;
    const length = type === 'corridor' ? 10 : type === 'extract' ? 12 : 15;
    const zEntry = this.nextZ;
    const zExit = zEntry - length;
    this.nextZ = zExit;

    const group = new THREE.Group();
    const tex = getStoneTex();
    const wallMat = new THREE.MeshStandardMaterial({ map: tex, color: 0x8a7a60 });
    const floorMat = new THREE.MeshStandardMaterial({ map: tex, color: 0x6b5d48 });
    const w = type === 'corridor' ? 5 : WIDTH;

    // 地板/天花
    const floor = new THREE.Mesh(new THREE.BoxGeometry(w, 0.3, length), floorMat);
    floor.position.set(0, -0.15, zEntry - length / 2);
    floor.receiveShadow = true;
    group.add(floor);
    const ceil = new THREE.Mesh(new THREE.BoxGeometry(w, 0.3, length),
      new THREE.MeshStandardMaterial({ map: tex, color: 0x3a3228 }));
    ceil.position.set(0, HEIGHT, zEntry - length / 2);
    group.add(ceil);

    // 侧墙
    const wallGeo = new THREE.BoxGeometry(0.4, HEIGHT, length);
    const wl = new THREE.Mesh(wallGeo, wallMat);
    wl.position.set(-w / 2, HEIGHT / 2, zEntry - length / 2);
    group.add(wl);
    const wr = new THREE.Mesh(wallGeo, wallMat);
    wr.position.set(w / 2, HEIGHT / 2, zEntry - length / 2);
    group.add(wr);

    // 端墙（带门洞：左右两块+门楣）
    const doorW = 2.2;
    const endWallSide = new THREE.BoxGeometry((w - doorW) / 2, HEIGHT, 0.4);
    const el = new THREE.Mesh(endWallSide, wallMat);
    el.position.set(-(doorW / 2 + (w - doorW) / 4), HEIGHT / 2, zExit);
    group.add(el);
    const er = new THREE.Mesh(endWallSide, wallMat);
    er.position.set(doorW / 2 + (w - doorW) / 4, HEIGHT / 2, zExit);
    group.add(er);
    const lintel = new THREE.Mesh(new THREE.BoxGeometry(doorW, HEIGHT - 3.2, 0.4), wallMat);
    lintel.position.set(0, HEIGHT - (HEIGHT - 3.2) / 2, zExit);
    group.add(lintel);
    // 门洞内的黑暗
    const dark = new THREE.Mesh(
      new THREE.PlaneGeometry(doorW, 3.2),
      new THREE.MeshBasicMaterial({ color: 0x000000 })
    );
    dark.position.set(0, 1.6, zExit - 0.25);
    group.add(dark);

    // 火把（带光源，限2个控制性能）
    const torches                     = [];
    const torchGeo = new THREE.CylinderGeometry(0.05, 0.08, 0.6, 6);
    const torchMat = new THREE.MeshStandardMaterial({ color: 0x4a3520 });
    for (const side of [-1, 1]) {
      const tz = zEntry - length * 0.45;
      const torch = new THREE.Mesh(torchGeo, torchMat);
      torch.position.set(side * (w / 2 - 0.35), 2.6, tz);
      torch.rotation.z = -side * 0.3;
      group.add(torch);
      const flame = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 6, 5),
        new THREE.MeshBasicMaterial({ color: 0xffaa33 })
      );
      flame.position.set(side * (w / 2 - 0.42), 2.95, tz);
      group.add(flame);
      const light = new THREE.PointLight(0xff8830, 6, 12, 1.6);
      light.position.copy(flame.position);
      group.add(light);
      torches.push(light);
    }

    // 类型化布置
    const crates               = [];
    if (type === 'treasure') {
      const crateGeo = new THREE.BoxGeometry(1.1, 0.9, 0.85);
      const crateMat = new THREE.MeshStandardMaterial({ color: 0x7a5a30 });
      const n = 2 + Math.floor(Math.random() * 2);
      for (let i = 0; i < n; i++) {
        const crate = new THREE.Mesh(crateGeo, crateMat.clone());
        const side = i % 2 === 0 ? -1 : 1;
        crate.position.set(
          side * (2.2 + Math.random() * 1.6),
          0.45,
          zEntry - 4 - i * 3.2
        );
        crate.rotation.y = Math.random() * 0.6 - 0.3;
        crate.castShadow = true;
        crate.userData.crate = true;
        crate.userData.searched = false;
        group.add(crate);
        crates.push(crate);
      }
      // 金光点缀
      const glow = new THREE.PointLight(0xffd24d, 2, 8, 2);
      glow.position.set(0, 1.5, zEntry - length / 2);
      group.add(glow);
    } else if (type === 'altar') {
      const pillar = new THREE.Mesh(
        new THREE.CylinderGeometry(0.5, 0.7, 1.6, 8),
        new THREE.MeshStandardMaterial({ color: 0x55607a })
      );
      pillar.position.set(0, 0.8, zEntry - length / 2 - 1);
      group.add(pillar);
      const orb = new THREE.Mesh(
        new THREE.SphereGeometry(0.35, 12, 10),
        new THREE.MeshStandardMaterial({ color: 0x8fb8ff, emissive: 0x2244aa })
      );
      orb.position.set(0, 2.0, zEntry - length / 2 - 1);
      orb.userData.altarOrb = true;
      group.add(orb);
      const light = new THREE.PointLight(0x6688ff, 4, 10, 1.8);
      light.position.copy(orb.position);
      group.add(light);
    } else if (type === 'extract') {
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(1.3, 0.12, 8, 24),
        new THREE.MeshStandardMaterial({ color: 0x35e07a, emissive: 0x117733 })
      );
      ring.position.set(0, 1.8, zExit + 2.5);
      group.add(ring);
      const light = new THREE.PointLight(0x35e07a, 6, 12, 1.6);
      light.position.copy(ring.position);
      group.add(light);
    } else if (type === 'combat') {
      // 残骸装饰
      const boneMat = new THREE.MeshStandardMaterial({ color: 0xd8cfb8 });
      for (let i = 0; i < 3; i++) {
        const bone = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.7, 5), boneMat);
        bone.position.set(
          (Math.random() - 0.5) * (w - 3), 0.06,
          zEntry - 2 - Math.random() * (length - 4)
        );
        bone.rotation.set(Math.PI / 2, 0, Math.random() * Math.PI);
        group.add(bone);
      }
    }

    this.scene.add(group);
    const room       = {
      type,
      depth: this.depthCount,
      group,
      zEntry,
      zCenter: zEntry - length / 2,
      zExit,
      length,
      crates,
      searched: 0,
      torches,
      cleared: false,
    };
    this.rooms.push(room);

    // 只保留最近4个房间
    while (this.rooms.length > 4) {
      const old = this.rooms.shift() ;
      this.scene.remove(old.group);
      old.group.traverse((o                ) => {
        const m = o              ;
        if (m.geometry) m.geometry.dispose();
      });
    }
    return room;
  }

  // 火把闪烁
  flicker(time        )       {
    for (const room of this.rooms) {
      for (let i = 0; i < room.torches.length; i++) {
        const t = room.torches[i];
        t.intensity = 5 + Math.sin(time * 9 + i * 2.7 + room.depth) * 1.2 + Math.random() * 0.6;
      }
    }
  }
}

// V1敌人：丧尸（普通型，策划案敌人表第一行：低生命/慢速/多数量/爆头秒杀）
class Zombie {
  mesh             ;
  head            ;
  body            ;
  hp        ;
  maxHp        ;
  speed        ;
  dead          = false;
  removed          = false;
          attackTimer         = 0;
          deathTimer         = 0;
          bobPhase         = Math.random() * Math.PI * 2;
          bodyMat                            ;
          flashTimer         = 0;

  constructor(scene             , pos               , depth        ) {
    this.maxHp = 12 + depth * 3;
    this.hp = this.maxHp;
    this.speed = 1.5 + Math.random() * 0.6 + Math.min(1.2, depth * 0.06);

    this.mesh = new THREE.Group();
    const skin = new THREE.Color().setHSL(0.25 + Math.random() * 0.06, 0.35, 0.32);
    this.bodyMat = new THREE.MeshStandardMaterial({ color: skin });

    this.body = new THREE.Mesh(new THREE.BoxGeometry(0.62, 1.05, 0.4), this.bodyMat);
    this.body.position.y = 0.95;
    this.body.castShadow = true;
    this.body.userData.part = 'body';
    this.body.userData.zombie = this;
    this.mesh.add(this.body);

    this.head = new THREE.Mesh(
      new THREE.SphereGeometry(0.21, 10, 8),
      new THREE.MeshStandardMaterial({ color: skin.clone().offsetHSL(0, 0, 0.06) })
    );
    this.head.position.y = 1.72;
    this.head.userData.part = 'head';
    this.head.userData.zombie = this;
    this.mesh.add(this.head);

    // 红眼
    const eyeGeo = new THREE.SphereGeometry(0.035, 6, 5);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff3322 });
    const eL = new THREE.Mesh(eyeGeo, eyeMat);
    eL.position.set(-0.07, 1.75, 0.18);
    const eR = eL.clone();
    eR.position.x = 0.07;
    this.mesh.add(eL, eR);

    // 前伸双臂（丧尸姿态）
    const armGeo = new THREE.BoxGeometry(0.13, 0.13, 0.62);
    const armL = new THREE.Mesh(armGeo, this.bodyMat);
    armL.position.set(-0.24, 1.25, 0.35);
    const armR = armL.clone();
    armR.position.x = 0.24;
    this.mesh.add(armL, armR);

    // 腿
    const legGeo = new THREE.BoxGeometry(0.2, 0.45, 0.22);
    const legL = new THREE.Mesh(legGeo, this.bodyMat);
    legL.position.set(-0.16, 0.22, 0);
    const legR = legL.clone();
    legR.position.x = 0.16;
    this.mesh.add(legL, legR);

    this.mesh.position.copy(pos);
    scene.add(this.mesh);
  }

  // 返回本帧是否对玩家造成攻击
  update(dt        , time        , playerPos               , audio         )          {
    if (this.dead) {
      // 倒地淡出
      this.deathTimer += dt;
      this.mesh.rotation.x = Math.min(Math.PI / 2, this.deathTimer * 4);
      if (this.deathTimer > 1.1) this.removed = true;
      return false;
    }

    const to = new THREE.Vector3().subVectors(playerPos, this.mesh.position);
    to.y = 0;
    const dist = to.length();
    if (dist > 1.1) {
      to.normalize();
      this.mesh.position.addScaledVector(to, this.speed * dt);
      this.mesh.rotation.y = Math.atan2(to.x, to.z);
      // 蹒跚摇晃
      this.mesh.rotation.z = Math.sin(time * 4 + this.bobPhase) * 0.08;
      this.mesh.position.y = Math.abs(Math.sin(time * 5 + this.bobPhase)) * 0.05;
    }

    if (this.flashTimer > 0) {
      this.flashTimer -= dt;
      if (this.flashTimer <= 0) this.bodyMat.emissive.setHex(0x000000);
    }

    // 近战攻击
    this.attackTimer -= dt;
    if (dist < 1.4 && this.attackTimer <= 0) {
      this.attackTimer = 1.4;
      audio.meleeHit();
      return true;
    }
    return false;
  }

  // 命中：part='head'爆头。返回实际伤害与是否致死
  takeDamage(amount        , part        )                                                      {
    if (this.dead) return { dmg: 0, killed: false, headshot: false };
    const headshot = part === 'head';
    const dmg = headshot ? amount * 3 : amount;
    this.hp -= dmg;
    this.bodyMat.emissive.setHex(0x661111);
    this.flashTimer = 0.07;
    if (this.hp <= 0) {
      this.dead = true;
      return { dmg, killed: true, headshot };
    }
    return { dmg, killed: false, headshot };
  }

  dispose(scene             )       {
    scene.remove(this.mesh);
    this.mesh.traverse((o                ) => {
      const m = o              ;
      if (m.geometry) m.geometry.dispose();
    });
  }
}

class ZombieManager {
  zombies           = [];
          scene             ;

  constructor(scene             ) {
    this.scene = scene;
  }

  // 在房间内生成一波
  spawnWave(zFrom        , zTo        , width        , depth        , count        )       {
    for (let i = 0; i < count; i++) {
      const x = (Math.random() - 0.5) * (width - 2.5);
      const z = zTo + Math.random() * (zFrom - zTo) * 0.55; // 房间深处
      this.zombies.push(new Zombie(this.scene, new THREE.Vector3(x, 0, z), depth));
    }
  }

  get aliveCount()         {
    return this.zombies.filter((z) => !z.dead).length;
  }

  // 返回本帧攻击次数
  update(dt        , time        , playerPos               , audio         )         {
    let hits = 0;
    for (const z of this.zombies) {
      if (z.update(dt, time, playerPos, audio)) hits++;
    }
    const gone = this.zombies.filter((z) => z.removed);
    for (const z of gone) z.dispose(this.scene);
    this.zombies = this.zombies.filter((z) => !z.removed);
    return hits;
  }

  // 射线检测目标集合
  targets()                   {
    const out                   = [];
    for (const z of this.zombies) {
      if (z.dead) continue;
      out.push(z.head, z.body);
    }
    return out;
  }

  clearAll()       {
    for (const z of this.zombies) z.dispose(this.scene);
    this.zombies = [];
  }
}

// 玩家载具：越肩相机 + 手电 + 枪械（自动前进，策划案"通用规则"）
class PlayerRig {
  position                = new THREE.Vector3(0, 0, 2);
  hp         = 100;
  maxHp         = 100;
  sanity         = 60;
  maxSanity         = 60;
  coins         = 0;       // 本局战利品
  damageMult         = 1;  // 强化弹药加成
  alive          = true;

  // 枪械
           magSize         = 12;
  ammo         = 12;
  reloading         = 0;   // >0 换弹中（剩余秒）
           reloadTime         = 1.15;
          fireCooldown         = 0;
           fireInterval         = 0.22;
  baseDamage         = 8;

  camera                         ;
          gun             ;
          muzzleFlash                  ;
          flashlight                 ;
          recoil         = 0;
  walkSpeed         = 3.2;

  constructor(scene             , camera                         ) {
    this.camera = camera;

    // 手电筒（核心微恐光源）
    this.flashlight = new THREE.SpotLight(0xfff2d9, 28, 26, 0.42, 0.45, 1.4);
    scene.add(this.flashlight);
    scene.add(this.flashlight.target);

    // 枪模型挂相机（屏幕右下）
    this.gun = new THREE.Group();
    const gunMat = new THREE.MeshStandardMaterial({ color: 0x2c2c33, metalness: 0.7, roughness: 0.35 });
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.11, 0.34), gunMat);
    this.gun.add(body);
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.022, 0.2, 8), gunMat);
    barrel.rotation.x = Math.PI / 2;
    barrel.position.set(0, 0.035, -0.25);
    this.gun.add(barrel);
    const grip = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.14, 0.07), gunMat);
    grip.position.set(0, -0.1, 0.1);
    grip.rotation.x = 0.3;
    this.gun.add(grip);
    // 持枪的手
    const hand = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 8, 6),
      new THREE.MeshStandardMaterial({ color: 0xe8bd9a })
    );
    hand.position.set(0, -0.09, 0.08);
    this.gun.add(hand);
    camera.add(this.gun);
    this.gun.position.set(0.22, -0.18, -0.55);
    scene.add(camera);

    this.muzzleFlash = new THREE.PointLight(0xffcc66, 0, 4, 2);
    this.muzzleFlash.position.set(0.22, -0.12, -0.85);
    camera.add(this.muzzleFlash);
  }

  // 是否可开火
  canFire()          {
    return this.alive && this.reloading <= 0 && this.fireCooldown <= 0 && this.ammo > 0;
  }

  fire(audio         )          {
    if (this.reloading > 0 || this.fireCooldown > 0) return false;
    if (this.ammo <= 0) {
      audio.dryFire();
      this.startReload(audio);
      return false;
    }
    this.ammo -= 1;
    this.fireCooldown = this.fireInterval;
    this.recoil = 1;
    this.muzzleFlash.intensity = 8;
    audio.gunshot();
    if (this.ammo <= 0) this.startReload(audio);
    return true;
  }

  startReload(audio         )       {
    if (this.reloading > 0 || this.ammo >= this.magSize) return;
    this.reloading = this.reloadTime;
    audio.reloadStart();
  }

  takeDamage(amount        )       {
    if (!this.alive) return;
    this.hp -= amount;
    if (this.hp <= 0) {
      this.hp = 0;
      this.alive = false;
    }
  }

  heal(v        )       {
    this.hp = Math.min(this.maxHp, this.hp + v);
  }
  addSanity(v        )       {
    this.sanity = Math.min(this.maxSanity, this.sanity + v);
  }

  update(dt        , moving         , mouseNDC               , audio         , time        )       {
    if (moving && this.alive) {
      this.position.z -= this.walkSpeed * dt;
    }

    if (this.reloading > 0) {
      this.reloading -= dt;
      if (this.reloading <= 0) {
        this.ammo = this.magSize;
        audio.reloadEnd();
      }
    }
    if (this.fireCooldown > 0) this.fireCooldown -= dt;
    this.recoil = Math.max(0, this.recoil - dt * 7);
    this.muzzleFlash.intensity = Math.max(0, this.muzzleFlash.intensity - dt * 60);

    // 越肩相机：右肩后上方，鼠标提供视差转动
    const yawOff = mouseNDC.x * 0.34;
    const pitchOff = mouseNDC.y * 0.22;
    const camPos = new THREE.Vector3(
      this.position.x + 0.55 + Math.sin(yawOff) * 0.3,
      this.position.y + 1.72 + (moving ? Math.sin(time * 8) * 0.025 : 0),
      this.position.z + 2.1
    );
    this.camera.position.lerp(camPos, 0.25);
    const lookAt = new THREE.Vector3(
      this.position.x + Math.sin(yawOff) * 14,
      this.position.y + 1.55 + Math.sin(pitchOff) * 9 + this.recoil * 0.5,
      this.position.z - 14
    );
    this.camera.lookAt(lookAt);

    // 枪口微动 + 换弹下沉
    const reloadDip = this.reloading > 0 ? 0.16 : 0;
    this.gun.position.set(
      0.22,
      -0.18 - reloadDip + Math.sin(time * 7.7) * 0.004 + this.recoil * 0.03,
      -0.55 + this.recoil * 0.07
    );
    this.gun.rotation.x = this.recoil * 0.22 - reloadDip * 1.6;

    // 手电跟随准星
    this.flashlight.position.copy(this.camera.position);
    this.flashlight.target.position.copy(lookAt);
  }
}

  )       {
    this.hpFill.style.width = `${Math.max(0, (hp / maxHp) * 100)}%`;
    this.hpText.textContent = `${Math.ceil(hp)}`;
    this.sanFill.style.width = `${Math.max(0, (sanity / maxSanity) * 100)}%`;
    this.sanText.textContent = `${Math.ceil(sanity)}`;
    this.ammoText.textContent = reloading > 0 ? '装填中' : `${ammo} / ${magSize}`;
    this.reloadHint.style.opacity = reloading > 0 ? '1' : '0';
    if (reloading > 0) {
      const p = 1 - reloading / reloadTime;
      this.reloadHint.textContent = `🔄 ${(p * 100).toFixed(0)}%`;
    }
    this.coinsText.textContent = `🪙 ${coins}`;
    this.depthText.textContent = `深度 ${depth}`;
    this.stateText.textContent = stateLabel;

    // 准星跟随鼠标
    this.crosshair.style.transform = `translate(${mousePx.x}px, ${mousePx.y}px)`;

    if (this.hitTimer > 0) {
      this.hitTimer -= dt;
      this.hitmarker.style.transform = `translate(${mousePx.x}px, ${mousePx.y}px)`;
      if (this.hitTimer <= 0) this.hitmarker.style.opacity = '0';
    }
    if (this.toastTimer > 0) {
      this.toastTimer -= dt;
      if (this.toastTimer <= 0) this.toastEl.style.opacity = '0';
    }

    // 低血/低神智暗角
    const danger = Math.max(1 - hp / maxHp, 1 - sanity / maxSanity);
    this.vignette.style.opacity = `${Math.min(0.85, danger * 0.9)}`;
  }

  showHitmarker(headshot         )       {
    this.hitmarker.style.opacity = '1';
    this.hitmarker.style.color = headshot ? '#ff5c5c' : '#ffffff';
    this.hitmarker.style.fontSize = headshot ? '30px' : '22px';
    this.hitTimer = 0.18;
  }

  setPrompt(text               )       {
    if (text) {
      this.promptEl.textContent = text;
      this.promptEl.style.opacity = '1';
    } else {
      this.promptEl.style.opacity = '0';
    }
  }

  showToast(text        )       {
    this.toastEl.textContent = text;
    this.toastEl.style.opacity = '1';
    this.toastTimer = 1.8;
  }

  // ===== 搜索面板 =====
  showSearchPanel(label        )       {
    this.searchPanel.style.display = 'flex';
    this.searchLabel.textContent = label;
    this.searchFill.style.width = '0%';
  }
  setSearchProgress(p        )       {
    this.searchFill.style.width = `${Math.min(100, p * 100)}%`;
  }
  hideSearchPanel()       {
    this.searchPanel.style.display = 'none';
  }

  // ===== 岔路选择 =====
  showChoice(options            )       {
    this.choiceCards.innerHTML = '';
    for (const t of options) {
      const info = ROOM_INFO[t];
      const card = document.createElement('button');
      card.className = 'door-card';
      card.innerHTML = `<span class="door-icon">${info.icon}</span><strong>${info.name}之间</strong><em>${info.hint}</em>`;
      card.addEventListener('click', () => {
        this.choiceOverlay.style.display = 'none';
        if (this.onChoice) this.onChoice(t);
      });
      this.choiceCards.appendChild(card);
    }
    this.choiceOverlay.style.display = 'flex';
  }

  showExtractDialog(coins        )       {
    document.getElementById('extract-coins') .textContent =
      `当前已搜刮战利品价值：🪙 ${coins}`;
    this.extractOverlay.style.display = 'flex';
  }

  showEnd(victory         , title        , lines          )       {
    this.endTitle.textContent = title;
    this.endTitle.style.color = victory ? '#35e07a' : '#ff5c5c';
    this.endStats.innerHTML = lines.map((l) => `<div>${l}</div>`).join('');
    this.endOverlay.style.display = 'flex';
  }

  floatText(worldPos               , text        , cls        )       {
    if (this.floaters.length > 30) return;
    const el = document.createElement('div');
    el.className = `floater ${cls}`;
    el.textContent = text;
    this.floaterLayer.appendChild(el);
    this.floaters.push({ el, worldPos: worldPos.clone(), age: 0, life: 0.65 });
  }

  updateFloaters(dt        , camera              )       {
    const w = window.innerWidth, h = window.innerHeight;
    const v = new THREE.Vector3();
    for (const f of this.floaters) {
      f.age += dt;
      if (f.age >= f.life) {
        f.el.remove();
        continue;
      }
      f.worldPos.y += dt * 1.2;
      v.copy(f.worldPos).project(camera);
      f.el.style.transform = `translate(${(v.x * 0.5 + 0.5) * w}px, ${(-v.y * 0.5 + 0.5) * h}px)`;
      f.el.style.opacity = `${1 - f.age / f.life}`;
    }
    this.floaters = this.floaters.filter((f) => f.age < f.life);
  }
}


// ===== game.ts =====

// 单局状态机（策划案"通用规则"：移动/战斗/选择/搜索 4状态）
                                                                                

const STATE_LABEL                         = {
  moving: '▶ 前进中…',
  combat: '⚔ 战斗！消灭所有敌人',
  search: '🔍 搜索中（点击箱子）',
  choice: '🚪 选择路线',
  extract: '🟢 撤离点',
  over: '',
};

class Game {
          renderer                     ;
          scene             ;
          camera                         ;
          clock              = new THREE.Clock();
          raycaster                  = new THREE.Raycaster();

          input       ;
          audio         ;
          meta      ;
          dungeon         ;
          zombies               ;
          player           ;
          hud     ;

          state            = 'moving';
          currentRoom              = null;
          enteredDepth         = 0;       // 已触发入场逻辑的最大深度
          triggeredDepth         = 0;     // 已触发中心事件的最大深度
          pendingChoice                    = null;
          kills         = 0;
          searchTarget                    = null;
          searchProgress         = 0;
          tracers                                      = [];

  constructor(canvas                   , meta      , audio         ) {
    this.meta = meta;
    this.audio = audio;

    this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.shadowMap.enabled = false; // 微恐场景靠点光，省掉阴影开销

    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x07060a);
    this.scene.fog = new THREE.Fog(0x07060a, 8, 30);
    // 极弱环境光（黑暗为主）
    this.scene.add(new THREE.AmbientLight(0x44404a, 0.35));

    this.camera = new THREE.PerspectiveCamera(
      62, window.innerWidth / window.innerHeight, 0.05, 80
    );
    window.addEventListener('resize', () => {
      this.camera.aspect = window.innerWidth / window.innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(window.innerWidth, window.innerHeight);
    });

    this.input = new Input(canvas);
    this.dungeon = new Dungeon(this.scene);
    this.zombies = new ZombieManager(this.scene);
    this.player = new PlayerRig(this.scene, this.camera);
    this.hud = new HUD();

    this.hud.onSkipSearch = () => this.finishSearch();
    this.hud.onChoice = (t          ) => {
      this.pendingChoice = null;
      const room = this.dungeon.append(t);
      this.audio.doorOpen();
      this.state = 'moving';
    };
    this.hud.onExtract = (leave         ) => {
      if (leave) {
        this.endRun(true, '撤离成功');
      } else {
        this.hud.showToast('继续深入……更危险，也更富有');
        this.state = 'moving';
      }
    };

    // 起始：一条回廊 + 第一间房
    this.dungeon.append('corridor');
    this.appendNext();
    this.meta.data.runs += 1;
    this.meta.save();
  }

  start()       {
    this.renderer.setAnimationLoop(() => this.tick());
  }

  // 生成下一个房间（单选直接放，双选挂起）
          appendNext()       {
    const options = this.dungeon.nextOptions();
    if (options.length === 1) {
      this.dungeon.append(options[0]);
    } else {
      this.pendingChoice = options;
    }
  }

          roomAt(z        )              {
    for (const r of this.dungeon.rooms) {
      if (z <= r.zEntry && z > r.zExit) return r;
    }
    return null;
  }

          endRun(extracted         , title        )       {
    this.state = 'over';
    const c = this.player.coins;
    const depth = this.dungeon.currentDepth;
    if (extracted) {
      this.meta.data.bank += c;
      this.meta.data.extracts += 1;
      this.audio.extractOk();
    } else {
      this.audio.death();
    }
    if (depth > this.meta.data.bestDepth) this.meta.data.bestDepth = depth;
    this.meta.save();
    const lines = extracted
      ? [`带出战利品：🪙 ${c}`, `探索深度：${depth} 个房间`, `击杀：${this.kills}`, `金库总额：🪙 ${this.meta.data.bank}`]
      : [`损失战利品：🪙 ${c}（搜打撤的代价）`, `探索深度：${depth} 个房间`, `击杀：${this.kills}`, `金库总额：🪙 ${this.meta.data.bank}`];
    this.hud.showEnd(extracted, title, lines);
  }

  // ===== 射击 =====
          tryShoot()       {
    if (!this.player.canFire()) {
      if (this.player.ammo <= 0 && this.player.reloading <= 0) this.player.fire(this.audio);
      return;
    }
    this.player.fire(this.audio);

    this.raycaster.setFromCamera(this.input.mouseNDC, this.camera);
    const hits = this.raycaster.intersectObjects(this.zombies.targets(), false);

    // 弹道光线
    const start = new THREE.Vector3(
      this.camera.position.x + 0.2, this.camera.position.y - 0.1, this.camera.position.z - 0.5
    );
    const end = hits.length > 0
      ? hits[0].point.clone()
      : this.raycaster.ray.at(30, new THREE.Vector3());
    const mid = start.clone().add(end).multiplyScalar(0.5);
    const len = start.distanceTo(end);
    const tracer = new THREE.Mesh(
      new THREE.CylinderGeometry(0.012, 0.012, len, 4),
      new THREE.MeshBasicMaterial({ color: 0xffe9a0, transparent: true, opacity: 0.85 })
    );
    tracer.position.copy(mid);
    tracer.quaternion.setFromUnitVectors(
      new THREE.Vector3(0, 1, 0), end.clone().sub(start).normalize()
    );
    this.scene.add(tracer);
    this.tracers.push({ mesh: tracer, age: 0 });

    if (hits.length > 0) {
      const obj = hits[0].object;
      const z = obj.userData.zombie          ;
      const part = obj.userData.part          ;
      const result = z.takeDamage(
        Math.round(this.player.baseDamage * this.player.damageMult), part
      );
      this.hud.showHitmarker(result.headshot);
      this.hud.floatText(
        hits[0].point, `${result.dmg}`, result.headshot ? 'head' : 'dmg'
      );
      if (result.headshot) this.audio.headshot();
      else this.audio.hit();
      if (result.killed) {
        this.audio.zombieDie();
        this.kills += 1;
        const c = 2 + Math.floor(Math.random() * 3);
        this.player.coins += c;
        this.hud.floatText(z.mesh.position.clone().setY(1.2), `+${c}🪙`, 'coin');
      }
    }
  }

  // ===== 搜索 =====
          trySearchClick()       {
    if (!this.currentRoom) return;
    this.raycaster.setFromCamera(this.input.mouseNDC, this.camera);
    const crates = this.currentRoom.crates.filter((c) => !c.userData.searched);
    const hits = this.raycaster.intersectObjects(crates, false);
    if (hits.length > 0) {
      this.searchTarget = hits[0].object              ;
      this.searchProgress = 0;
      this.hud.showSearchPanel('搜索中…');
    }
  }

          finishSearch()       {
    this.hud.hideSearchPanel();
    this.searchTarget = null;
    this.state = 'moving';
    this.hud.setPrompt(null);
  }

          applyLoot()       {
    const loot = rollLoot(this.dungeon.currentDepth);
    this.audio.loot();
    if (loot.coins > 0) this.audio.coin();
    this.player.coins += loot.coins;
    if (loot.hp > 0) this.player.heal(loot.hp);
    if (loot.sanity > 0) this.player.addSanity(loot.sanity);
    if (loot.ammoBoost) this.player.damageMult += 0.1;
    this.hud.showToast(`${loot.icon} ${loot.name}`);
  }

  // ===== 房间事件 =====
          onEnterRoom(room      )       {
    this.enteredDepth = room.depth;
    // 神智消耗（策划案"神智"节）
    const cost = 3 + Math.floor(room.depth / 5);
    this.player.sanity -= cost;
    this.audio.sanityHit();
    this.hud.floatText(
      new THREE.Vector3(this.player.position.x, 2.6, this.player.position.z - 2),
      `神智 -${cost}`, 'sanity'
    );
    if (this.player.sanity <= 0) {
      this.player.sanity = 0;
      this.endRun(true, '神智崩溃 — 强制撤离');
      return;
    }
    // 提前生成后续房间
    if (!this.pendingChoice && room.depth >= this.dungeon.currentDepth) {
      this.appendNext();
    }
  }

          onRoomCenter(room      )       {
    this.triggeredDepth = room.depth;
    const w = room.type === 'corridor' ? 5 : 11;
    if (room.type === 'combat') {
      const count = 3 + Math.floor(room.depth / 3) + Math.floor(Math.random() * 2);
      this.zombies.spawnWave(room.zCenter, room.zExit + 1.5, w, room.depth, count);
      this.audio.zombieGroan(0.1);
      this.state = 'combat';
    } else if (room.type === 'corridor') {
      if (Math.random() < 0.35) {
        this.zombies.spawnWave(room.zCenter, room.zExit + 1, w, room.depth, 1 + Math.floor(Math.random() * 2));
        this.audio.zombieGroan(0.09);
        this.state = 'combat';
      }
    } else if (room.type === 'treasure') {
      this.state = 'search';
      this.hud.setPrompt('点击箱子搜索战利品，或点"继续前进"');
      this.hud.showSearchPanel('点击箱子开始搜索');
      this.hud.setSearchProgress(0);
    } else if (room.type === 'altar') {
      const r = Math.random();
      if (r < 0.4) {
        this.player.damageMult += 0.15;
        this.hud.showToast('🔮 祭坛赐福：伤害 +15%');
      } else if (r < 0.7) {
        this.player.heal(40);
        this.hud.showToast('🔮 祭坛赐福：生命 +40');
      } else {
        this.player.addSanity(18);
        this.hud.showToast('🔮 祭坛赐福：神智 +18');
      }
      this.audio.altar();
    } else if (room.type === 'extract') {
      this.state = 'extract';
      this.hud.showExtractDialog(this.player.coins);
    }
  }

          tick()       {
    const dt = Math.min(this.clock.getDelta(), 0.05);
    const time = this.clock.elapsedTime;

    this.audio.updateAmbient(dt, this.player.sanity / this.player.maxSanity);
    this.dungeon.flicker(time);

    // 弹道衰减
    for (const t of this.tracers) {
      t.age += dt;
      (t.mesh.material                           ).opacity = Math.max(0, 0.85 * (1 - t.age / 0.09));
    }
    const oldT = this.tracers.filter((t) => t.age > 0.09);
    for (const t of oldT) {
      this.scene.remove(t.mesh);
      (t.mesh.material                  ).dispose();
      t.mesh.geometry.dispose();
    }
    this.tracers = this.tracers.filter((t) => t.age <= 0.09);

    if (this.state !== 'over') {
      // R 主动换弹
      if (this.input.wasPressed('KeyR')) this.player.startReload(this.audio);

      const moving = this.state === 'moving';
      this.player.update(dt, moving, this.input.mouseNDC, this.audio, time);

      // 房间检测
      const room = this.roomAt(this.player.position.z);
      if (room) {
        this.currentRoom = room;
        if (room.depth > this.enteredDepth) this.onEnterRoom(room);
        if (
          this.state === 'moving' &&
          room.depth > this.triggeredDepth &&
          this.player.position.z <= room.zCenter
        ) {
          this.onRoomCenter(room);
        }
        // 岔路：走到出口处弹选择
        if (
          this.state === 'moving' && this.pendingChoice &&
          room.depth >= this.dungeon.currentDepth &&
          this.player.position.z <= room.zExit + 1.6
        ) {
          this.state = 'choice';
          this.hud.showChoice(this.pendingChoice);
        }
      }

      // 战斗
      if (this.state === 'combat' || this.zombies.zombies.length > 0) {
        const attacks = this.zombies.update(dt, time, this.player.position, this.audio);
        for (let i = 0; i < attacks; i++) {
          this.player.takeDamage(8 + Math.floor(this.dungeon.currentDepth / 4));
        }
        if (this.state === 'combat' && this.zombies.aliveCount === 0 && this.zombies.zombies.length === 0) {
          this.state = 'moving';
          if (this.currentRoom) this.currentRoom.cleared = true;
          this.hud.showToast('✅ 区域安全，继续前进');
        }
      }

      // 射击（战斗/移动状态下点击）
      if ((this.state === 'combat' || this.state === 'moving') && this.input.isFiring()) {
        this.tryShoot();
      }

      // 搜索
      if (this.state === 'search') {
        if (this.input.consumeClick() && !this.searchTarget) {
          this.trySearchClick();
        }
        if (this.searchTarget) {
          this.searchProgress += dt / 1.3;
          this.hud.setSearchProgress(this.searchProgress);
          if (Math.floor(this.searchProgress * 10) !== Math.floor((this.searchProgress - dt / 1.3) * 10)) {
            this.audio.searchTick();
          }
          if (this.searchProgress >= 1) {
            this.searchTarget.userData.searched = true;
            (this.searchTarget.material                              ).color.setHex(0x3a3a3a);
            if (this.currentRoom) this.currentRoom.searched += 1;
            this.applyLoot();
            this.searchTarget = null;
            this.hud.showSearchPanel('点击下一个箱子，或继续前进');
            this.hud.setSearchProgress(0);
            // 全部搜完自动继续
            if (this.currentRoom && this.currentRoom.searched >= this.currentRoom.crates.length) {
              this.finishSearch();
              this.hud.showToast('箱子已搜空，继续前进');
            }
          }
        }
      }

      // 死亡
      if (!this.player.alive && this.state !== 'over') {
        this.endRun(false, 'YOU DIED — 战利品全部丢失');
      }
    }

    this.input.endFrame();

    this.hud.update(
      dt, this.player.hp, this.player.maxHp,
      this.player.sanity, this.player.maxSanity,
      this.player.ammo, this.player.magSize, this.player.reloading, this.player.reloadTime,
      this.player.coins, this.dungeon.currentDepth,
      STATE_LABEL[this.state], this.input.mousePx
    );
    this.hud.updateFloaters(dt, this.camera);

    this.renderer.render(this.scene, this.camera);
  }
}


// ===== main.ts =====

const meta = new Meta();
const audio = new AudioFX();

document.getElementById('bank-text') .textContent =
  `🪙 金库 ${meta.data.bank} ｜ 最深 ${meta.data.bestDepth} ｜ 撤离 ${meta.data.extracts}/${meta.data.runs}`;

document.getElementById('start-btn') .addEventListener('click', () => {
  audio.init();
  audio.startAmbient();
  document.getElementById('start-overlay') .style.display = 'none';
  const canvas = document.getElementById('game-canvas')                     ;
  const game = new Game(canvas, meta, audio);
  game.start();
});
