<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>古墓不让进 — V4 原型</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background-color: #211a10; }
  body { display: flex; align-items: center; justify-content: center; }
  /* 竖屏舞台：9:16 居中，两侧露出风格化石纹背景 */
  #stage {
    position: relative; overflow: hidden; cursor: none;
    width: min(100vw, calc(100vh * 9 / 16));
    height: min(100vh, calc(100vw * 16 / 9));
    box-shadow: 0 0 80px rgba(0,0,0,.9), 0 0 18px rgba(200,162,60,.12);
    border-left: 1px solid rgba(200,162,60,.25);
    border-right: 1px solid rgba(200,162,60,.25);
  }
  #game-canvas { display: block; width: 100%; height: 100%; }
  #hud {
    position: absolute; inset: 0; pointer-events: none;
    font-family: 'Segoe UI', system-ui, sans-serif; color: #fff;
  }
  /* 暗角：低血(红) */
  #vignette {
    position: absolute; inset: 0; pointer-events: none; opacity: 0;
    background: radial-gradient(ellipse at center, transparent 42%, rgba(120,0,10,.75) 100%);
    transition: opacity .4s;
  }
  /* 暗角：低神智(蓝) */
  #vignette-san {
    position: absolute; inset: 0; pointer-events: none; opacity: 0;
    background: radial-gradient(ellipse at center, transparent 42%, rgba(30,60,170,.78) 100%);
    transition: opacity .3s;
  }
  /* 左上：血量/神智 */
  #stat-panel {
    position: absolute; top: 14px; left: 14px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .sbar {
    width: 220px; height: 16px; border-radius: 8px; overflow: hidden; position: relative;
    background: rgba(0,0,0,.6); border: 1px solid rgba(255,255,255,.22);
  }
  .sbar .fill { height: 100%; transition: width .15s; }
  #hp-fill { background: linear-gradient(90deg,#a8182a,#e8504d); width: 100%; }
  #san-fill { background: linear-gradient(90deg,#4455cc,#7d9bff); width: 100%; }
  .sbar .lab {
    position: absolute; inset: 0; font-size: 11px; line-height: 16px;
    padding-left: 8px; text-shadow: 0 1px 2px #000;
  }
  .sbar .num {
    position: absolute; right: 8px; top: 0; font-size: 11px; line-height: 16px;
    text-shadow: 0 1px 2px #000;
  }
  /* 右上：金币/深度 */
  #run-panel {
    position: absolute; top: 14px; right: 18px; text-align: right;
    font-weight: 700; text-shadow: 0 1px 3px #000;
  }
  #coins-text { font-size: 20px; color: #ffd24d; }
  #depth-text { font-size: 14px; color: #b9c4d8; margin-top: 4px; }
  /* 右上角拾取记录滚动列表 */
  #pickup-log {
    position: absolute; top: 44px; right: 14px; width: 190px;
    display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
    pointer-events: none; z-index: 6;
  }
  .pickup-row {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 6px 10px; border-radius: 8px;
    background: var(--qc, rgba(120,120,120,.35));
    border: 1px solid rgba(255,255,255,.25); color: #fff;
    text-shadow: 0 1px 2px #000; font-size: 13px;
    opacity: 0; transform: translateY(-8px);
    transition: opacity .3s ease, transform .35s ease;
  }
  .pickup-row.show { opacity: 1; transform: translateY(0); }
  .pickup-row.hl { box-shadow: 0 0 12px rgba(255,255,255,.5); border-color: #fff; }
  .pickup-row.fade { opacity: 0; transform: translateY(14px); }
  .pickup-row .pl-icon { font-size: 18px; }
  .pickup-row .pl-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pickup-row .pl-n { color: #ffe6a0; font-weight: 700; }
  /* 底中：弹药 */
  #ammo-panel {
    position: absolute; bottom: 26px; right: 30px; text-align: right;
  }
  #ammo-text { font-size: 30px; font-weight: 800; letter-spacing: 2px; text-shadow: 0 2px 4px #000; }
  #reload-hint { font-size: 14px; color: #ffd24d; opacity: 0; text-shadow: 0 1px 2px #000; }
  #ammo-sub { font-size: 11px; color: rgba(255,255,255,.5); }
  /* 状态标签 */
  #state-text {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    font-size: 17px; font-weight: 700; color: #e8d9b0; text-shadow: 0 1px 4px #000;
    letter-spacing: 1px;
  }
  /* 准星 */
  #crosshair {
    position: absolute; left: -12px; top: -12px; width: 24px; height: 24px;
    pointer-events: none; will-change: transform;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,.9);
  }
  #crosshair::before { left: 11px; top: 2px; width: 2px; height: 20px; }
  #crosshair::after { left: 2px; top: 11px; width: 20px; height: 2px; }
  #hitmarker {
    position: absolute; left: -10px; top: -28px; pointer-events: none;
    font-size: 22px; font-weight: 900; opacity: 0; will-change: transform;
    text-shadow: 0 1px 3px #000;
  }
  #toast {
    position: absolute; top: 90px; left: 50%; transform: translateX(-50%);
    font-size: 22px; font-weight: 800; color: #ffe34d;
    text-shadow: 0 2px 6px #000; opacity: 0; transition: opacity .3s;
  }
  #prompt {
    position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%);
    font-size: 15px; color: #aaf0ff; text-shadow: 0 1px 4px #000;
    opacity: 0; transition: opacity .2s;
  }
  #controls-hint {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    font-size: 12px; color: rgba(255,255,255,.45); text-shadow: 0 1px 2px #000;
  }
  /* 搜索面板 */
  #search-panel {
    position: absolute; bottom: 170px; left: 50%; transform: translateX(-50%);
    display: none; flex-direction: column; gap: 8px; align-items: center;
    pointer-events: auto;
  }
  #search-label { font-size: 14px; color: #ffe9b0; text-shadow: 0 1px 3px #000; }
  #search-track {
    width: 260px; height: 12px; border-radius: 6px; overflow: hidden;
    background: rgba(0,0,0,.6); border: 1px solid rgba(255,255,255,.3);
  }
  #search-fill { height: 100%; width: 0%; background: linear-gradient(90deg,#ffd24d,#ffefa0); }
  #skip-btn {
    padding: 6px 18px; font-size: 13px; font-weight: 700; cursor: pointer;
    border: 1px solid rgba(255,255,255,.4); border-radius: 6px;
    background: rgba(20,26,40,.8); color: #fff;
  }
  #skip-btn:hover { background: rgba(50,60,85,.9); }
  /* BOSS血条 */
  #boss-bar {
    position: absolute; top: 52px; left: 50%; transform: translateX(-50%);
    width: 480px; display: none;
  }
  #boss-name {
    text-align: center; font-size: 15px; font-weight: 700; color: #ff8866;
    text-shadow: 0 1px 3px #000; margin-bottom: 4px;
  }
  #boss-track {
    height: 13px; border-radius: 7px; overflow: hidden;
    background: rgba(0,0,0,.6); border: 1px solid rgba(255,120,100,.5);
  }
  #boss-fill {
    height: 100%; width: 100%;
    background: linear-gradient(90deg,#aa1818,#ff6a3c); transition: width .15s;
  }
  #weapon-name {
    font-size: 12px; color: #b9c4d8; text-shadow: 0 1px 2px #000; margin-top: 2px;
  }
  /* 军械库/图鉴 */
  .shop-row {
    display: flex; align-items: center; gap: 10px; font-size: 14px;
    background: #1d2235; border: 1px solid rgba(255,255,255,.18);
    border-radius: 8px; padding: 8px 14px; width: 430px;
  }
  .shop-row strong { flex: 1; text-align: left; }
  .shop-row button {
    padding: 5px 14px; border: none; border-radius: 6px; cursor: pointer;
    background: #c8a23c; color: #1d1605; font-weight: 700;
  }
  .shop-row button:disabled { background: #555; color: #999; cursor: default; }
  #gallery {
    display: flex; flex-wrap: wrap; gap: 6px; max-width: 520px; justify-content: center;
  }
  .g-item {
    width: 44px; height: 44px; border-radius: 7px; font-size: 20px;
    background: rgba(20,26,40,.8); border: 2px solid rgba(255,255,255,.18);
    display: flex; align-items: center; justify-content: center;
  }
  .g-item.locked { opacity: .35; filter: grayscale(1); }
  .tab-row { display: flex; gap: 10px; }
  .tab-btn {
    padding: 6px 18px; font-size: 14px; cursor: pointer; border-radius: 6px;
    border: 1px solid rgba(255,255,255,.3); background: rgba(20,26,40,.8); color: #fff;
  }
  .tab-btn.active { background: #c8a23c; color: #1d1605; font-weight: 700; }
  /* 背包 */
  #bag-panel {
    position: absolute; left: 14px; bottom: 26px;
    display: flex; flex-direction: column; gap: 5px;
  }
  #bag-slots { display: flex; gap: 4px; }
  .bag-slot {
    width: 42px; height: 42px; border-radius: 7px; position: relative;
    background: rgba(10,14,24,.7); border: 2px solid rgba(255,255,255,.18);
    display: flex; align-items: center; justify-content: center;
  }
  .bag-slot .b-icon { font-size: 19px; }
  .bag-slot .b-val {
    position: absolute; right: 2px; bottom: 1px; font-size: 9px; color: #ffd24d;
    text-shadow: 0 1px 2px #000;
  }
  #bag-value { font-size: 12px; color: #ffd24d; text-shadow: 0 1px 2px #000; }
  #con-slots { display: flex; gap: 5px; margin-top: 2px; }
  .con-slot {
    display: flex; align-items: center; gap: 4px; padding: 3px 8px;
    background: rgba(10,14,24,.7); border: 1px solid rgba(255,255,255,.25);
    border-radius: 6px; font-size: 13px;
  }
  .con-slot.empty { opacity: .4; }
  .con-slot .c-key {
    width: 15px; height: 15px; border-radius: 3px; background: rgba(255,255,255,.2);
    font-size: 10px; display: flex; align-items: center; justify-content: center;
  }
  .con-slot .c-n { font-size: 11px; color: #b9c4d8; }
  /* 伤害飘字 */
  #floater-layer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .floater {
    position: absolute; left: 0; top: 0;
    font-size: 15px; font-weight: 800; color: #ffd9a0;
    text-shadow: 0 1px 3px #000; will-change: transform, opacity;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .floater.head { color: #ff5c5c; font-size: 20px; }
  .floater.coin { color: #ffd24d; }
  .floater.sanity { color: #7d9bff; }
  /* 遮罩 */
  .overlay {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center; flex-direction: column; gap: 18px;
    background: rgba(5,4,8,.85); pointer-events: auto; cursor: auto;
    font-family: 'Segoe UI', system-ui, sans-serif; color: #fff; z-index: 10;
  }
  .overlay h1 { font-size: 44px; text-shadow: 0 3px 10px #000; letter-spacing: 3px; }
  .overlay .sub { color: #9aa6bd; font-size: 14px; margin-top: -8px; }
  .big-btn {
    padding: 13px 42px; font-size: 18px; font-weight: 700;
    border: none; border-radius: 8px; cursor: pointer;
    background: #c8a23c; color: #1d1605;
  }
  .big-btn:hover { background: #e8c25c; }
  @media (max-width: 560px) {
    .sbar { width: 150px; }
    #ammo-text { font-size: 22px; }
    .overlay h1 { font-size: 30px; }
    .door-card { width: 160px !important; padding: 14px 10px !important; }
    .shop-row { width: 92vw; }
    #controls-hint { font-size: 10px; white-space: normal; text-align: center; width: 95%; }
  }
  .door-card, .extract-btn {
    display: flex; flex-direction: column; gap: 8px; align-items: center;
    width: 230px; padding: 24px 18px; border-radius: 12px; cursor: pointer;
    background: #1d2235; border: 2px solid rgba(255,255,255,.22);
    color: #fff; font-family: inherit; text-align: center;
    transition: transform .12s, border-color .12s;
  }
  .door-card:hover { transform: translateY(-4px); border-color: #ffd24d; }
  .door-card .door-icon { font-size: 38px; }
  .door-card strong { font-size: 19px; }
  .door-card em { font-size: 13px; color: #b9c4d8; font-style: normal; }
  #choice-cards, #extract-btns { display: flex; gap: 20px; }
  /* 选择卡：竖屏舞台内自适应，3选1也不溢出 */
  #choice-cards { flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 96%; }
  #choice-cards .door-card {
    width: 30%; min-width: 104px; max-width: 168px; padding: 14px 8px; gap: 5px;
  }
  #choice-cards .door-card .door-icon { font-size: 30px; }
  #choice-cards .door-card strong { font-size: 15px; }
  #choice-cards .door-card em { font-size: 11px; }
  #extract-coins { font-size: 16px; color: #ffd24d; }
  #end-stats { font-size: 17px; color: #ddd; text-align: center; line-height: 1.9; }
  #start-overlay { display: flex; }
  #start-overlay .rules {
    font-size: 14px; color: #b9c4d8; line-height: 2; text-align: center;
  }
  #bank-text { font-size: 15px; color: #ffd24d; }
  /* ===== 触屏底部 HUD ===== */
  #bag-btn {
    position: absolute; left: 14px; bottom: 16px; width: 60px; height: 60px;
    border-radius: 14px; border: 2px solid rgba(255,210,77,.6);
    background: rgba(12,16,26,.82); color: #fff; font-size: 26px; cursor: pointer;
    pointer-events: auto; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 10px rgba(0,0,0,.55); -webkit-tap-highlight-color: transparent;
  }
  #bag-btn:active { transform: scale(.94); }
  /* 搜刮飞入背包的物品图标 */
  .fly-item {
    position: absolute; left: 0; top: 0; width: 76px; height: 76px;
    display: flex; align-items: center; justify-content: center; font-size: 38px;
    /* 品质色圆形色块，四周渐隐；无外框 */
    background: radial-gradient(circle, var(--glow, #fff) 0%, rgba(255,255,255,0) 66%);
    text-shadow: 0 1px 4px rgba(0,0,0,.7);
    pointer-events: none; z-index: 7; will-change: left, top, transform, opacity;
  }
  #pause-btn {
    position: absolute; top: 14px; right: 80px; width: 40px; height: 40px;
    border-radius: 10px; border: 1px solid rgba(255,255,255,.35);
    background: rgba(12,16,26,.8); color: #fff; font-size: 18px; cursor: pointer;
    pointer-events: auto; -webkit-tap-highlight-color: transparent; z-index: 5;
  }
  #pause-btn:active { transform: scale(.93); }
  #bag-btn-val {
    position: absolute; right: -2px; bottom: -2px; font-size: 10px; color: #ffd24d;
    background: rgba(0,0,0,.7); border-radius: 6px; padding: 0 4px; line-height: 14px;
  }
  #action-bar {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; align-items: flex-end; pointer-events: auto;
  }
  #weapon-slots { display: flex; gap: 10px; align-items: flex-end; }
  /* 物品栏(消耗品)+下拉 */
  #item-wrap { position: relative; }
  #item-expand {
    position: absolute; top: -8px; right: -8px; width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,.4); background: rgba(20,26,40,.95); color: #fff;
    font-size: 11px; cursor: pointer; pointer-events: auto; z-index: 2;
  }
  #item-dropdown {
    position: absolute; bottom: 76px; left: 50%; transform: translateX(-50%);
    display: none; flex-direction: column; gap: 4px; padding: 6px;
    background: rgba(12,16,26,.96); border: 1px solid rgba(255,255,255,.3); border-radius: 10px;
    pointer-events: auto; min-width: 150px; max-height: 240px; overflow-y: auto; z-index: 20;
  }
  #item-dropdown.open { display: flex; }
  .item-row {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 6px;
    background: rgba(30,36,52,.9); color: #fff; cursor: pointer; font-size: 13px; white-space: nowrap;
  }
  .item-row:active { background: #3a4466; }
  .item-row .ir-icon { font-size: 18px; }
  .item-row .ir-n { margin-left: auto; color: #b9c4d8; }
  .item-row .ir-desc { font-size: 10px; color: #8b96ad; }
  #bag-bullets { font-size: 15px; color: #ffd24d; }
  .wbtn .w-icon { font-weight: 800; }
  #aux-bar {
    position: absolute; bottom: 18px; right: 14px;
    display: flex; gap: 8px; pointer-events: auto;
  }
  .wbtn, .abtn {
    position: relative; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 64px; height: 64px; border-radius: 14px; cursor: pointer;
    background: rgba(12,16,26,.82); color: #fff; border: 2px solid rgba(255,255,255,.25);
    box-shadow: 0 2px 10px rgba(0,0,0,.55); -webkit-tap-highlight-color: transparent;
    transition: border-color .12s, transform .08s, box-shadow .12s;
  }
  .abtn.small { width: 50px; height: 50px; }
  .wbtn:active, .abtn:active { transform: scale(.93); }
  .wbtn .w-icon, .abtn .a-icon { font-size: 25px; line-height: 1; }
  .wbtn .w-ammo { font-size: 11px; color: #ffd24d; margin-top: 3px; font-weight: 700; }
  .abtn .a-n { font-size: 11px; color: #b9c4d8; margin-top: 3px; }
  .wbtn.selected { border-color: #ffd24d; box-shadow: 0 0 16px rgba(255,210,77,.75); }
  .abtn.empty { opacity: .4; }
  /* 背包弹窗内的格子布局 */
  #bag-overlay #bag-slots {
    display: flex; flex-wrap: wrap; gap: 8px; max-width: 320px; justify-content: center;
  }
  #bag-overlay #bag-value { font-size: 17px; color: #ffd24d; }
  @media (max-width: 560px) {
    .wbtn, .abtn { width: 56px; height: 56px; }
    .abtn.small { width: 46px; height: 46px; }
    #bag-btn { width: 54px; height: 54px; }
  }
  /* ===== 网格背包 ===== */
  #bag-top { display: flex; gap: 14px; align-items: center; justify-content: center; }
  .wslot {
    position: relative; width: 70px; height: 70px; border-radius: 10px;
    background: rgba(10,14,24,.8); border: 2px dashed rgba(255,210,77,.55);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .wslot.filled { border-style: solid; border-color: #ffd24d; box-shadow: 0 0 12px rgba(255,210,77,.45); }
  .wslot.drop-ok { border-color: #7CFFB0; box-shadow: 0 0 14px rgba(124,255,176,.6); }
  .wslot .wslot-lab { position: absolute; bottom: 2px; left: 0; right: 0; text-align: center;
    font-size: 10px; color: rgba(255,255,255,.5); }
  #bag-info { font-size: 13px; color: #b9c4d8; line-height: 1.7; text-align: left; }
  #bag-info #bag-value { font-size: 15px; color: #ffd24d; }
  #bag-info #bag-bullets { font-size: 14px; color: #ffd24d; }
  #bag-hint { font-size: 11px; color: rgba(255,255,255,.4); }
  #inv-grid {
    position: relative; margin: 4px auto 0;
    width: calc(var(--cell) * 6); height: calc(var(--cell) * 5);
    --cell: 44px;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,.10) 0 1px, transparent 1px var(--cell)),
      repeating-linear-gradient(90deg, rgba(255,255,255,.10) 0 1px, transparent 1px var(--cell)),
      rgba(8,11,18,.85);
    border: 2px solid rgba(255,255,255,.22); border-radius: 8px;
    touch-action: none;
  }
  .inv-item {
    position: absolute; border: 2px solid #888; border-radius: 7px;
    background: rgba(22,27,40,.95); cursor: grab; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 0 10px rgba(0,0,0,.5); -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  .inv-item .i-icon { font-size: 22px; pointer-events: none; }
  .inv-item .i-badge {
    position: absolute; right: 2px; bottom: 1px; font-size: 10px; color: #ffe6a0;
    text-shadow: 0 1px 2px #000; pointer-events: none; font-weight: 700;
  }
  .inv-item .i-name {
    position: absolute; left: 3px; top: 2px; font-size: 9px; color: rgba(255,255,255,.7);
    pointer-events: none; max-width: 90%; white-space: nowrap; overflow: hidden;
  }
  .inv-ghost {
    position: fixed; z-index: 50; pointer-events: none; opacity: .85;
    border: 2px solid #ffd24d; border-radius: 7px; background: rgba(30,36,52,.95);
    display: flex; align-items: center; justify-content: center; font-size: 22px;
  }
  .inv-popup {
    position: fixed; z-index: 60; background: #1d2235; border: 1px solid rgba(255,255,255,.3);
    border-radius: 8px; padding: 6px; display: flex; flex-direction: column; gap: 5px;
    box-shadow: 0 6px 18px rgba(0,0,0,.6);
  }
  .inv-popup .pop-title { font-size: 12px; color: #ffd24d; padding: 2px 6px; text-align: center; }
  .inv-popup .pop-desc { font-size: 11px; color: #b9c4d8; padding: 0 6px 4px; text-align: center; max-width: 180px; }
  .inv-popup button {
    font-size: 13px; padding: 6px 16px; border: none; border-radius: 6px; cursor: pointer;
    background: #2c3450; color: #fff;
  }
  .inv-popup button:hover { background: #3a4466; }
  .inv-popup button.danger { background: #6a2230; }
  /* ===== 搜索圆环（容器顶部） ===== */
  #search-ring {
    position: absolute; left: 0; top: 0; width: 84px; height: 84px;
    transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 6;
  }
  #search-ring svg { width: 100%; height: 100%; }
  #search-ring .sr-bg { fill: rgba(0,0,0,.5); stroke: rgba(255,255,255,.22); stroke-width: 7; }
  #search-ring .sr-fg {
    fill: none; stroke: #ffd24d; stroke-width: 7; stroke-linecap: round;
    stroke-dasharray: 264; stroke-dashoffset: 264;
    transform: rotate(-90deg); transform-origin: 50% 50%;
  }
  #search-ring .sr-spin { position: absolute; inset: 0; animation: sr-rot 1.1s linear infinite; }
  #search-ring .sr-icon { position: absolute; left: 50%; top: -3px; transform: translateX(-50%); font-size: 17px; }
  @keyframes sr-rot { to { transform: rotate(360deg); } }
  /* ===== 商店 ===== */
  #shop-bank { font-size: 16px; color: #ffd24d; }
  #shop-items { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; max-width: 96%; }
  .shop-item {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    width: 30%; min-width: 110px; max-width: 170px; padding: 14px 8px;
    background: #1d2235; border: 2px solid rgba(255,255,255,.22); border-radius: 12px; color: #fff;
  }
  .shop-item .s-icon { font-size: 32px; }
  .shop-item strong { font-size: 15px; }
  .shop-item .s-desc { font-size: 11px; color: #b9c4d8; min-height: 26px; }
  .shop-item .s-buy {
    padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer;
    background: #c8a23c; color: #1d1605; font-weight: 700; font-size: 13px;
  }
  .shop-item .s-buy:disabled { background: #555; color: #999; cursor: default; }
</style>
</head>
<body>
<div id="stage">
<canvas id="game-canvas"></canvas>
<div id="vignette"></div>
<div id="vignette-san"></div>
<div id="hud">
  <div id="stat-panel">
    <div class="sbar"><div id="hp-fill" class="fill"></div><div class="lab">生命</div><div id="hp-text" class="num">100</div></div>
    <div class="sbar"><div id="san-fill" class="fill"></div><div class="lab">神智</div><div id="san-text" class="num">60</div></div>
  </div>
  <div id="state-text">▶ 前进中…</div>
  <div id="boss-bar"><div id="boss-name"></div><div id="boss-track"><div id="boss-fill"></div></div></div>
  <div id="run-panel">
    <div id="depth-text">深度 0</div>
  </div>
  <div id="pickup-log"></div>
  <div id="toast"></div>
  <div id="prompt"></div>
  <div id="search-panel">
    <div id="search-label"></div>
    <button id="skip-btn">继续前进 ▶</button>
  </div>
  <button id="pause-btn">⏸</button>
  <!-- 触屏底部 HUD -->
  <button id="bag-btn">🎒<span id="bag-btn-val">0</span></button>
  <div id="action-bar">
    <div id="weapon-slots"></div>
    <button id="nade-btn" class="abtn empty"><span class="a-icon">🧨</span><span class="a-n">×0</span></button>
    <div id="item-wrap">
      <button id="item-btn" class="abtn empty"><span class="a-icon">🧪</span><span class="a-n">×0</span></button>
      <button id="item-expand">▲</button>
      <div id="item-dropdown"></div>
    </div>
  </div>
  <div id="aux-bar">
    <button id="skill-btn" class="abtn small empty" style="display:none"><span class="a-icon">🦉</span><span class="a-n">×0</span></button>
  </div>
</div>
<div id="crosshair"></div>
<div id="hitmarker">✕</div>
<div id="search-ring">
  <svg viewBox="0 0 100 100">
    <circle class="sr-bg" cx="50" cy="50" r="42"></circle>
    <circle class="sr-fg" cx="50" cy="50" r="42"></circle>
  </svg>
  <div class="sr-spin"><span class="sr-icon">🔍</span></div>
</div>
<div id="floater-layer"></div>
<div id="choice-overlay" class="overlay">
  <h1 id="choice-title">选择路线</h1>
  <div class="sub" id="choice-sub">两扇门后是不同的命运</div>
  <div id="choice-cards"></div>
</div>
<div id="extract-overlay" class="overlay">
  <h1>🟢 撤离点</h1>
  <div id="extract-coins"></div>
  <div class="sub">撤离可保住全部战利品；继续深入收益更高，但死亡将失去一切</div>
  <div id="extract-btns">
    <button id="extract-yes" class="door-card"><span class="door-icon">🏃</span><strong>撤离</strong><em>落袋为安</em></button>
    <button id="extract-no" class="door-card"><span class="door-icon">⬇️</span><strong>继续深入</strong><em>富贵险中求</em></button>
  </div>
</div>
<div id="bagfull-overlay" class="overlay">
  <h1>🎒 背包已满</h1>
  <div id="bagfull-new" class="sub" style="font-size:16px"></div>
  <div id="bagfull-low" class="sub" style="font-size:16px"></div>
  <div style="display:flex; gap:20px">
    <button id="bagfull-replace" class="door-card"><span class="door-icon">🔄</span><strong>丢低换新</strong><em>舍弃最低价值物品</em></button>
    <button id="bagfull-discard" class="door-card"><span class="door-icon">🚮</span><strong>放弃新物品</strong><em>保持背包不变</em></button>
  </div>
</div>
<div id="intel-overlay" class="overlay">
  <h1>📋 战前情报</h1>
  <div id="intel-text" style="font-size:15px; line-height:1.9; text-align:center; color:#d8d2c0"></div>
  <button id="intel-continue" class="big-btn">准备完毕，前进</button>
</div>
<div id="bag-overlay" class="overlay">
  <h1>🎒 背包</h1>
  <div id="bag-top">
    <div class="wslot" id="wslot-0" data-slot="0"><span class="wslot-lab">武器1</span></div>
    <div class="wslot" id="wslot-1" data-slot="1"><span class="wslot-lab">武器2</span></div>
    <div id="bag-info">
      <div id="bag-value">总价值 0</div>
      <div id="bag-bullets">🔫 子弹 ×0</div>
      <div id="bag-hint">拖动整理 · 拖入武器栏装备 · 点击物品交互</div>
    </div>
  </div>
  <div id="inv-grid"></div>
  <button id="bag-close" class="big-btn">关闭</button>
</div>
<div id="pause-overlay" class="overlay">
  <h1>⏸ 已暂停</h1>
  <div style="width:80%; max-width:320px; margin:6px 0 14px">
    <label style="display:flex; justify-content:space-between; font-size:15px; margin-bottom:8px">
      <span>🖱 瞄准灵敏度</span><span id="sens-val">0.8×</span>
    </label>
    <input id="sens-slider" type="range" min="0.3" max="1.6" step="0.05" value="0.8" style="width:100%">
  </div>
  <button id="resume-btn" class="big-btn">继续游戏</button>
</div>
<div id="shop-overlay" class="overlay">
  <h1>🛒 商店</h1>
  <div id="shop-bank">金库 💰 0</div>
  <div id="shop-items"></div>
  <div style="display:flex; gap:14px">
    <button id="shop-refresh" class="big-btn" style="background:#5aa0ff; color:#0a1a33">🔄 刷新（💰30）</button>
    <button id="shop-close" class="big-btn">离开商店</button>
  </div>
</div>
<div id="end-overlay" class="overlay">
  <h1 id="end-title"></h1>
  <div id="end-stats"></div>
  <button id="restart-btn" class="big-btn">再探一次</button>
</div>
<div id="start-overlay" class="overlay">
  <h1>古墓不让进</h1>
  <div class="sub">轻射击 PVE 搜打撤 · V4 ｜ 竖屏适配 · 触屏可玩</div>
  <div id="bank-text"></div>
  <div class="rules">
    自动前进，遭遇敌人时停下战斗 —— 鼠标瞄准，左键射击，<b style="color:#ff5c5c">爆头三倍伤害</b><br>
    宝藏房点击箱子搜刮 ｜ 岔路口二选一 ｜ 每进一房消耗<b style="color:#7d9bff">神智</b><br>
    撤离点可结算离场 —— <b style="color:#ffd24d">死了战利品就没了</b>
  </div>
  <div class="tab-row" id="chapter-row"></div>
  <div style="display:flex; gap:14px">
    <button id="start-btn" class="big-btn">进入古墓</button>
    <button id="checkpoint-btn" class="big-btn" style="display:none; background:#5aa0ff; color:#0a1a33"></button>
  </div>
  <div class="tab-row">
    <button id="tab-armory" class="tab-btn">🛠 军械库</button>
    <button id="tab-gallery" class="tab-btn">📖 收藏图鉴</button>
  </div>
  <div id="armory-panel" style="display:none; flex-direction:column; gap:8px"></div>
  <div id="gallery" style="display:none"></div>
</div>
</div>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
/*__BUNDLE__*/
</script>
</body>
</html>
